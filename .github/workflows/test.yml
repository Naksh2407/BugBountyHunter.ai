name: BugBountyHunter QA Verify Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f apps/api/requirements.txt ]; then pip install -r apps/api/requirements.txt; fi

    - name: Run Ruff Linter Scan (Scout)
      run: |
        ruff check apps/api/

    - name: Run Mypy Type Analysis (Scout)
      run: |
        mypy apps/api/

    - name: Run Unit Tests (QA Sandbox Verify)
      env:
        DATABASE_URL: sqlite:///./test_verify.db
      run: |
        pytest apps/api/
